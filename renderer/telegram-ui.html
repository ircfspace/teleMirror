<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' http://localhost:*; img-src 'self' data: https://cdn1.telesco.pe https://cdn2.telesco.pe https://cdn3.telesco.pe https://cdn.telesco.pe https://t.me; font-src https://fonts.gstatic.com;"
        />
        <link rel="stylesheet" href="../assets/css/shabnam.css" />
        <link rel="stylesheet" href="../assets/css/styles.css" />
    </head>
    <body>
        <!-- Title Bar -->
        <div class="title-bar">
            <div class="title-bar-content">
                <div class="title-bar-text">TeleMirror</div>
            </div>
            <div class="window-controls">
                <button class="window-button minimize-button" id="minimizeButton">−</button>
                <button class="window-button close-button" id="closeButton">×</button>
            </div>
        </div>

        <div class="app-container">
            <!-- Channel List -->
            <div class="channel-list">
                <div class="channel-list-header">
                    <div class="fetch-input-container">
                        <input
                            type="text"
                            class="fetch-input"
                            id="fetchInput"
                            data-i18n="enterChannelUsername"
                            placeholder="Enter channel username"
                        />
                        <button class="add-channel-button" id="addChannelButton">+</button>
                    </div>
                </div>
                <div class="channels-container" id="channelsContainer">
                    <!-- Channels will be added here -->
                </div>
            </div>

            <!-- Message Area -->
            <div class="message-area">
                <div class="message-header" id="messageHeader">
                    <div class="message-header-info">
                        <div class="header-channel-avatar" id="headerChannelAvatar">?</div>
                        <div>
                            <div class="channel-title" id="channelTitle" data-i18n="selectChannel">
                                Select a channel
                            </div>
                            <div
                                class="channel-subtitle"
                                id="channelSubtitle"
                                data-i18n="chooseFromList"
                            >
                                Choose from the list
                            </div>
                        </div>
                    </div>
                    <div class="header-buttons">
                        <button
                            class="header-view-button"
                            id="headerViewButton"
                            style="display: none"
                            data-i18n="viewChannel"
                            title="View Channel"
                        >
                            🔗
                        </button>
                        <button
                            class="header-leave-button"
                            id="headerLeaveButton"
                            style="display: none"
                            data-i18n="deleteChannel"
                            title="Delete Channel"
                        >
                            🗑
                        </button>
                    </div>
                </div>
                <div class="message-container" id="messageContainer">
                    <div class="empty-state">
                        <div class="empty-state-icon">📱</div>
                        <div class="empty-state-text" data-i18n="emptyStateTitle">
                            Select a channel to view messages
                        </div>
                        <div class="empty-state-subtext" data-i18n="emptyStateSubtext">
                            Choose from the channel list or add a new one
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBarFill"></div>
            </div>
            <div class="progress-info">
                <span class="progress-percent" id="progressPercent">0%</span>
                <div class="progress-message" id="progressMessage" data-i18n="initializing">
                    Initializing...
                </div>
            </div>
        </div>

        <!-- Bottom Menu Bar -->
        <div class="bottom-menu">
            <button
                class="menu-btn"
                id="themeSwitchBottom"
                data-i18n="changeTheme"
                title="Change Theme"
            >
                <span class="menu-icon">🌙</span>
            </button>
            <button class="menu-btn" id="langSwitchBottom" title="Language">
                <span class="menu-icon">🌐</span>
            </button>
            <button class="menu-btn" id="donateBtnBottom" data-i18n="donate" title="Donate">
                <span class="menu-icon">☕</span>
            </button>
        </div>

        <!-- Load JavaScript modules -->
        <script src="js/config-loader.js"></script>
        <script src="js/locales/en.js"></script>
        <script src="js/locales/fa.js"></script>
        <script src="js/i18n.js"></script>
        <script src="js/app.js"></script>
        <script src="js/ad-service.js"></script>
        <script src="js/channel-manager.js"></script>
        <script src="js/progress-manager.js"></script>
        <script src="js/theme-manager.js"></script>
        <script src="js/language-manager.js"></script>
        <script src="js/init.js"></script>
    </body>
</html>
