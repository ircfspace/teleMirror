name: Build

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build-win:
        runs-on: windows-latest

        strategy:
            matrix:
                arch: [x64, ia32, arm64]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm install

            - name: Build Electron app
              run: |
                  npx electron-builder --win --${{ matrix.arch }} --publish never
                  # Create proper ZIP structure with subfolder
                  powershell -Command "New-Item -Path 'tele-mirror' -ItemType Directory -Force; Copy-Item -Path 'dist/win-unpacked/*' -Destination 'tele-mirror/' -Recurse; Compress-Archive -Path 'tele-mirror/*' -DestinationPath 'tele-mirror-${{ matrix.arch }}-win.zip' -Force; Remove-Item -Path 'tele-mirror' -Recurse -Force"
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: tele-mirror-win-${{ matrix.arch }}
                  path: |
                      dist/
                      tele-mirror-${{ matrix.arch }}-win.zip

    build-linux:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                arch: [x64, arm64]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm install

            - name: Build Electron app
              run: |
                  npx electron-builder --linux --${{ matrix.arch }} --publish never --config.compression=maximum
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: tele-mirror-linux-${{ matrix.arch }}
                  path: dist/tele-mirror-*.tar.gz

    build-mac:
        runs-on: macos-latest

        strategy:
            matrix:
                arch: [x64, arm64]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm install

            - name: Build Electron app
              run: |
                  npx electron-builder --mac --${{ matrix.arch }} --publish never
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: tele-mirror-mac-${{ matrix.arch }}
                  path: dist/

    release:
        needs: [build-win, build-linux, build-mac]
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'

        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  draft: true
                  files: |
                      artifacts/**/*.zip
                      artifacts/**/*.tar.gz
                      artifacts/**/*.dmg
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
